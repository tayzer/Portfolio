<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tay's Developer Portfolio</title>
    <base href="./" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="images/tay-high-resolution-logo-transparent.png" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.5.1/github-markdown-light.min.css" referrerpolicy="no-referrer" />
    <style>
        /* Blazor error UI: hidden by default, shown when runtime adds .show */
        #blazor-error-ui { display: none; position: fixed; left: 0; right: 0; top: 0; background: #7f1d1d; color: white; padding: 0.75rem 1rem; text-align: center; z-index: 9999; font-family: Arial, Helvetica, sans-serif; }
        #blazor-error-ui.show { display: block; }
        #blazor-error-ui .reload, #blazor-error-ui .dismiss { color: #fff; margin-left: 0.75rem; cursor: pointer; text-decoration: underline; }
    </style>
    <script>
        (function () {
            const storageKey = "theme";
            const root = document.documentElement;
            const applyTheme = (theme) => root.setAttribute("data-theme", theme);

            const stored = localStorage.getItem(storageKey);
            if (stored) {
                applyTheme(stored);
            } else if (window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches) {
                applyTheme("light");
            } else {
                applyTheme("dark");
            }

            window.toggleTheme = function () {
                const current = root.getAttribute("data-theme") || "dark";
                const next = current === "dark" ? "light" : "dark";
                applyTheme(next);
                localStorage.setItem(storageKey, next);
            };
        })();
    </script>
</head>
<body>
    <div id="app">Loading...</div>
    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>
    <script src="_framework/blazor.webassembly.js"></script>
</body>
</html>
